name: Publish to GitHub Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@natca-itc'

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED" ]; then
            echo "Release tag '$TAG_NAME' does not match package.json version '$EXPECTED'."
            echo "Bump package.json or retag the release."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --tag beta
          else
            npm publish
          fi
