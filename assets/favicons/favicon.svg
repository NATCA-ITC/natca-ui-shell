<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NATCA control tower">
  <title>NATCA</title>
  <!-- White rounded-square plate, matching the original mark's color treatment. -->
  <rect width="512" height="512" rx="96" ry="96" fill="#ffffff"/>
  <g fill="#003366">
    <!-- Two antennas extending from the top of the cab. -->
    <rect x="228" y="60" width="10" height="74" rx="3"/>
    <rect x="274" y="60" width="10" height="74" rx="3"/>
    <!-- Horizontal cross-bar at antenna base (sits on the cab roof). -->
    <rect x="208" y="130" width="96" height="12" rx="2"/>
    <!-- Sloped cab roof: angled in from each side down to the wider cab body. -->
    <polygon points="184,196 328,196 308,142 204,142"/>
    <!-- Cab body. White window slit broken out below. -->
    <rect x="172" y="196" width="168" height="64"/>
    <!-- Window band across the cab. -->
    <rect x="184" y="214" width="144" height="14" fill="#ffffff"/>
    <!-- Cab underside / overhang. -->
    <rect x="180" y="260" width="152" height="14"/>
    <!-- Narrow neck transitioning to the shaft. -->
    <rect x="222" y="274" width="68" height="22"/>
    <!-- Shaft. -->
    <rect x="238" y="296" width="36" height="138"/>
    <!-- Wide flared base. -->
    <rect x="196" y="434" width="120" height="22" rx="3"/>
  </g>
</svg>
