<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NATCA">
  <title>NATCA</title>
  <!-- Rounded-square navy plate. Brand navy #003366. -->
  <rect width="512" height="512" rx="96" ry="96" fill="#003366"/>
  <!--
    Bold "N" letterform centered with ~12% padding so it reads cleanly at 16x16.
    Two vertical posts + a thick diagonal connector. White on navy.
    Coordinates chosen to balance optical weight at small sizes.
  -->
  <g fill="#ffffff">
    <!-- Left vertical post -->
    <rect x="112" y="112" width="68" height="288" rx="8" ry="8"/>
    <!-- Right vertical post -->
    <rect x="332" y="112" width="68" height="288" rx="8" ry="8"/>
    <!-- Diagonal connector (top-left to bottom-right of inner area) -->
    <polygon points="180,112 248,112 400,400 332,400"/>
  </g>
  <!-- Red brand accent: short underbar nodding to the NATCA radar/scope mark. -->
  <rect x="112" y="424" width="288" height="20" rx="6" ry="6" fill="#ce0e2d"/>
</svg>
